# config/params.yaml
# Parameters for the ArduCopter drone system.
# Loaded by launch/uav.launch.py and passed to all nodes.

# ──────────────────────────────────────────────────────────────────────────────
# scout_mission_node  (Phase 1: lawnmower scout  /  Phase 2: QR inspection)
# ──────────────────────────────────────────────────────────────────────────────
scout_mission_node:
  ros__parameters:

    # MAVSDK connection (via mavlink-router)
    mavsdk_address: "udpin://127.0.0.1:14552"

    # Camera optics
    camera_fov_deg: 70.0          # horizontal field of view [degrees]

    # QR alignment P-controller (Phase 2 ALIGNING)
    p_gain: 0.3                   # proportional gain [m/s per m offset]
    max_velocity: 0.5             # velocity clamp [m/s]
    center_threshold_px: 15       # pixel dead-band for centring

    # Altitude setpoints
    patrol_alt_m: 3.0             # Phase 1 lawnmower altitude [m AGL]
    scan_alt_m:   2.5             # Phase 2 descend-to altitude [m AGL]

    # Hover time after successful QR scan
    wait_time_sec: 5.0            # seconds to hover and publish DetectionReport

    # Lawnmower grid (local NED, origin = take-off point)
    grid_length_m:  20.0          # North extent [m]
    grid_width_m:   20.0          # East  extent [m]
    line_spacing_m:   3.0          # spacing between parallel legs [m]

    # Waypoint arrival tolerances
    waypoint_tol_scout:   1.2     # arrival radius during Phase 1 lawnmower [m]
    waypoint_tol_inspect: 0.6     # arrival radius during Phase 2 approach [m]

    # Phase 1 scout speed
    scout_speed_m_s: 1.5          # forward speed along lawnmower legs [m/s]

    # White-blob deduplication (fallback for Phase 1)
    blob_dedup_radius_m: 1.0      # minimum distance between distinct detections [m]
    min_blob_area_px: 800.0       # minimum blob area to register [px²]

    # ArUco detection
    # Dictionary IDs (cv2.aruco constants):
    #   DICT_4X4_50=0  DICT_4X4_100=1  DICT_5X5_50=4  DICT_6X6_50=8
    aruco_dict_id: 0               # DICT_4X4_50 — 4×4 grid, up to 50 unique IDs

# ──────────────────────────────────────────────────────────────────────────────
# logistic_map_node  (Foxglove chaos visualisation)
# ──────────────────────────────────────────────────────────────────────────────
logistic_map_node:
  ros__parameters:

    # MAVSDK connection (via mavlink-router)
    mavsdk_address: "udpin://127.0.0.1:14551"

# ──────────────────────────────────────────────────────────────────────────────
# telemetry_node  (uav_raspberry)
# ──────────────────────────────────────────────────────────────────────────────
telemetry_node:
  ros__parameters:
    connection_url: "udpin://127.0.0.1:14550"

# ──────────────────────────────────────────────────────────────────────────────
# camera_streamer_focus  (ugv_raspberry — GStreamer + V4L2 altitude-driven AF)
# ──────────────────────────────────────────────────────────────────────────────
camera_streamer_focus:
  ros__parameters:
    width: 640
    height: 480
    fps: 30
    jpeg_quality: 50
    v4l2_subdev: "/dev/v4l-subdev0"  # RPi Camera Module 3 focus subdevice
    focus_gain: 600.0                # focus = clamp(gain / max(alt, 0.5), 0, 1000)